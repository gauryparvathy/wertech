name: CI

on:
  pull_request:
    branches:
      - main
      - master
      - develop

jobs:
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wertech-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wertech-app/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Lint frontend
        run: npm run lint
      - name: Run frontend tests with coverage gate
        run: npm run test:ci
        env:
          CI: true
      - name: Build frontend
        run: npm run build

  backend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json
      - name: Install backend dependencies
        run: npm ci
      - name: Lint backend
        run: npm run lint
      - name: Run backend integration tests with coverage gate
        run: npm test
